name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Instalar dependencias
        run: npm ci || (sleep 10 && npm ci)
      - name: Type-check
        run: npm run typecheck
      - name: Tests (scorers + clasificador + evals)
        run: npm test
      # Gate de evals: corre con el modelo mock determinista (sin API key, gratis).
      # Falla si la exactitud cae por debajo del umbral (regresión de prompt).
      - name: Gate de evals
        run: npm run evals
